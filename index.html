<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 марта!</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }
        .fullscreen {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .fullscreen img {
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
            color: white;
            text-align: center;
            padding: 50px 20px 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        .overlay p {
            margin: 0;
            font-size: 1.2rem;
            font-style: italic;
        }
    </style>
</head>
<body>
    <!-- Скрытый аудиоплеер, который будет ждать команды -->
<audio id="bg-music" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
  Ваш браузер не поддерживает аудио.
</audio>

<script>
  // Находим элемент audio и всю страницу
  const audio = document.getElementById('bg-music');
  const body = document.body;

  // Как только пользователь кликнет по странице, пробуем включить музыку
  body.addEventListener('click', function() {
    // Используем промис для обработки возможной ошибки автозапуска
    let playPromise = audio.play();

    if (playPromise !== undefined) {
      playPromise.then(function() {
        // Автовоспроизведение началось успешно
        console.log("Музыка играет");
      }).catch(function(error) {
        // Автовоспроизведение заблокировано
        console.log("Автовоспроизведение не удалось");
      });
    }
  });
</script>
    <div class="fullscreen">
        <img src="otkrytka.gif" alt="Анимированная открытка на 8 марта">
        <div class="overlay">
            <!-- С 8 Марта!
            <p>Пусть этот день будет тёплым и нежным</p> -->
        </div>
    </div>
</body>
</html>
